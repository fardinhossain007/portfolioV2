<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#0b1020"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

  <!-- F -->
  <g fill="url(#f)">
    <rect x="20" y="14" width="9" height="36" rx="2"/>      <!-- stem -->
    <rect x="20" y="14" width="24" height="9" rx="2"/>      <!-- top arm -->
    <rect x="20" y="28" width="17" height="8" rx="2"/>      <!-- mid arm -->
  </g>

  <!-- dot -->
  <circle cx="45" cy="46" r="5" fill="#22d3ee"/>
</svg>
